<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniBot — Student Helper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="logo">🎓</div>
    <div class="header-text">
      <h1>UniBot</h1>
      <p>Your AI-powered university helper</p>
    </div>
    <div class="status">● Online</div>
  </header>

  <!-- ── API KEY BANNER ── -->
  <div id="apiBanner">
    <span>🔑 Enter your Gemini API key to start:</span>
    <input type="password" id="apiKeyInput" placeholder="Paste your API key here..." />
    <button onclick="saveKey()">Save Key</button>
  </div>

  <!-- ── QUICK QUESTION CHIPS ── -->
  <div class="chips">
    <button class="chip" onclick="sendChip(this)">📅 Exam prep tips</button>
    <button class="chip" onclick="sendChip(this)">📝 How to write a thesis</button>
    <button class="chip" onclick="sendChip(this)">☁️ What is cloud computing?</button>
    <button class="chip" onclick="sendChip(this)">🎓 Scholarship advice</button>
    <button class="chip" onclick="sendChip(this)">💼 Internship tips</button>
    <button class="chip" onclick="sendChip(this)">📚 Study techniques</button>
  </div>

  <!-- ── CHAT MESSAGES AREA ── -->
  <div id="chat">
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">🤖</div>
      <h2>Hi, I'm UniBot!</h2>
      <p>Ask me anything about university life — exams, projects, careers, or cloud computing!</p>
    </div>
  </div>

  <!-- ── MESSAGE INPUT ── -->
  <div class="input-bar">
    <textarea id="userInput" rows="1" placeholder="Ask anything about university life…" maxlength="500"></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="input-hint">Powered by Google Gemini (Free) · CodeAlpha Cloud Computing Internship</p>

  <script src="script.js"></script>
</body>
</html>
